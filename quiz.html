<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Learners — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #4A2E1E;
    --ink-soft: #5F3F2C;
    --ink-muted: rgba(74, 46, 30, 0.68);
    --ink-subtle: rgba(74, 46, 30, 0.45);
    --bg: #F7EFE2;
    --bg-deep: #F2E6D1;
    --surface: #FFFCF6;
    --border: rgba(74, 46, 30, 0.12);
    --border-soft: rgba(74, 46, 30, 0.06);

    --coral: #E08963;          /* default option */
    --coral-hover: #CE7751;
    --coral-deep: #B76443;
    --green: #4C9A6C;          /* correct */
    --green-deep: #3E7F58;
    --red: #D4574F;            /* wrong */
    --amber: #E0A24A;

    --radius: 14px;
    --radius-lg: 22px;
    --shadow-sm: 0 1px 2px rgba(74, 46, 30, 0.06);
    --shadow-md: 0 8px 24px rgba(74, 46, 30, 0.08);
    --shadow-lg: 0 20px 50px rgba(74, 46, 30, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px; line-height: 1.5;
    color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex; justify-content: center;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; font-size: inherit; color: inherit; }

  /* Decorative background waves */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(224, 137, 99, 0.08) 0, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(76, 154, 108, 0.06) 0, transparent 40%);
  }

  /* ========== Shell (phone) ========== */
  .shell {
    width: 100%; max-width: 460px;
    min-height: 100vh;
    background: var(--bg);
    display: flex; flex-direction: column;
    position: relative; z-index: 1;
  }
  @media (min-width: 500px) {
    body { padding: 24px 0; }
    .shell { border-radius: 36px; min-height: calc(100vh - 48px); box-shadow: var(--shadow-lg); overflow: hidden; max-width: 420px; }
  }

  /* Subtle paper-like texture via SVG pattern layer */
  .shell::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 40% at 80% 20%, rgba(224, 162, 74, 0.08), transparent),
      radial-gradient(ellipse 70% 30% at 20% 80%, rgba(76, 154, 108, 0.06), transparent);
    z-index: 0;
  }
  .shell > * { position: relative; z-index: 1; }

  /* ========== Top bar ========== */
  .topbar {
    display: grid; grid-template-columns: 40px 1fr 40px;
    align-items: center;
    padding: 18px 18px 6px;
  }
  .back-btn, .skip-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink); transition: background .15s;
  }
  .back-btn:hover { background: rgba(74, 46, 30, 0.06); }
  .skip-btn {
    width: auto; padding: 6px 4px; border-radius: 6px;
    color: var(--coral); font-weight: 600; font-size: 15px;
    justify-self: end;
  }
  .skip-btn:hover { color: var(--coral-deep); }
  .topbar-title {
    font-weight: 700; font-size: 17px; text-align: center;
    letter-spacing: -0.3px;
  }

  /* ========== Progress ========== */
  .progress-wrap { padding: 10px 22px 6px; }
  .progress-track {
    height: 6px; background: var(--bg-deep);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--green);
    border-radius: 999px;
    width: 0%; transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .progress-text {
    margin-top: 8px; font-size: 14px; font-weight: 600;
  }
  .progress-text .done { color: var(--green); }
  .progress-text .total { color: var(--ink-subtle); }

  /* ========== Age selector ========== */
  .age-bar {
    display: flex; gap: 6px; padding: 8px 18px 2px;
    justify-content: center;
  }
  .age-chip {
    padding: 6px 14px; border-radius: 999px;
    background: transparent; border: 1.5px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--ink-muted);
    transition: all .15s;
  }
  .age-chip:hover { border-color: var(--ink-subtle); color: var(--ink); }
  .age-chip.active {
    background: var(--ink); color: var(--surface);
    border-color: var(--ink);
  }

  /* ========== Body ========== */
  .body {
    flex: 1; padding: 18px 22px 8px;
    display: flex; flex-direction: column; gap: 22px;
  }

  /* Question */
  .q-title {
    font-size: 26px; font-weight: 800; line-height: 1.25;
    letter-spacing: -0.5px; color: var(--ink);
    padding: 8px 2px 0;
  }

  /* ========== Option pills (full-width stacked) ========== */
  .options { display: flex; flex-direction: column; gap: 12px; }

  .opt {
    position: relative;
    background: var(--coral); color: #fff;
    border: none; border-radius: var(--radius-lg);
    padding: 18px 22px;
    font-weight: 700; font-size: 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    cursor: pointer; text-align: left;
    transition: background .15s, transform .15s, box-shadow .15s;
    box-shadow: var(--shadow-sm);
  }
  .opt:hover:not(.locked):not(.correct):not(.wrong) {
    background: var(--coral-hover); transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .opt:active:not(.locked) { transform: translateY(0); }
  .opt .opt-text { flex: 1; }
  .opt .chev {
    display: grid; place-items: center; opacity: 0.85;
  }
  .opt .chev svg { width: 18px; height: 18px; }

  .opt.correct {
    background: var(--green); cursor: default;
    animation: pop .35s cubic-bezier(.2,1.2,.3,1);
  }
  .opt.correct::before {
    content: ''; position: absolute; top: -6px; left: 22px;
    width: 18px; height: 18px;
    background:
      linear-gradient(45deg, transparent 45%, var(--green) 45%, var(--green) 55%, transparent 55%) no-repeat,
      linear-gradient(-45deg, transparent 45%, var(--green) 45%, var(--green) 55%, transparent 55%) no-repeat,
      linear-gradient(90deg, transparent 45%, var(--green) 45%, var(--green) 55%, transparent 55%) no-repeat;
    background-size: 10px 10px, 10px 10px, 14px 2px;
    background-position: 0 0, 8px 0, 4px 8px;
    opacity: 0.85;
  }
  .opt.correct .chev { display: none; }
  .opt.correct .tick-circle {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: grid; place-items: center;
  }

  .opt.wrong {
    background: var(--red); cursor: default;
  }
  .opt.wrong .chev { display: none; }
  .opt.wrong .x-circle {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: grid; place-items: center;
  }

  .opt.dim { opacity: 0.55; }

  /* Explanation link below correct */
  .opt .explain-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12.5px; font-weight: 500; opacity: 0.9;
    margin-top: 4px;
  }
  .opt .opt-inner { display: flex; flex-direction: column; gap: 2px; }

  @keyframes pop {
    0% { transform: scale(.96); }
    60% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  /* ========== Footer ========== */
  .footer {
    padding: 14px 22px 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .report {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 500; color: var(--ink);
  }
  .report:hover { color: var(--coral); }
  .report .ico {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--ink); color: var(--surface);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 700;
  }
  .footer-icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: transparent; border: 1.5px solid var(--border);
    color: var(--ink-muted); display: grid; place-items: center;
    transition: all .15s;
  }
  .footer-icon-btn:hover { background: var(--surface); color: var(--ink); }

  /* ========== Feedback banner ========== */
  .banner {
    border-radius: var(--radius-lg); padding: 20px;
    color: #fff; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: slideIn .35s cubic-bezier(.2,1.2,.3,1);
  }
  .banner.win { background: var(--green); }
  .banner.lose { background: var(--red); }
  .banner .emoji { font-size: 40px; line-height: 1; }
  .banner .title { font-size: 20px; font-weight: 800; }
  .banner .pts {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.2); padding: 5px 14px;
    border-radius: 999px; font-weight: 700; font-size: 13px;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== Intro ========== */
  .intro {
    flex: 1; padding: 30px 22px;
    display: flex; flex-direction: column; gap: 20px;
    justify-content: center; text-align: center;
  }
  .intro-hero {
    width: 180px; height: 180px; margin: 0 auto;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, #FFDFA8, var(--bg-deep));
    display: grid; place-items: center;
    box-shadow: inset 0 -10px 20px rgba(74, 46, 30, 0.08);
  }
  .intro h1 {
    font-size: 30px; font-weight: 800; letter-spacing: -0.8px;
    line-height: 1.15;
  }
  .intro p { color: var(--ink-muted); max-width: 340px; margin: 0 auto; }
  .cta {
    width: 100%; padding: 18px;
    background: var(--green); color: #fff;
    border-radius: 999px; font-weight: 700; font-size: 16px;
    transition: background .15s;
    box-shadow: 0 6px 16px rgba(76, 154, 108, 0.3);
  }
  .cta:hover { background: var(--green-deep); }
  .cta.ink { background: var(--ink); box-shadow: 0 6px 16px rgba(74, 46, 30, 0.2); }
  .cta.ink:hover { background: var(--ink-soft); }
  .cta.coral { background: var(--coral); box-shadow: 0 6px 16px rgba(224, 137, 99, 0.3); }
  .cta.coral:hover { background: var(--coral-hover); }

  /* ========== Result ========== */
  .result {
    flex: 1; padding: 30px 22px;
    display: flex; flex-direction: column; gap: 18px;
    justify-content: center; text-align: center;
  }
  .result .star-box {
    width: 180px; height: 180px; margin: 0 auto;
  }
  .result h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.6px; }
  .result .sub { color: var(--ink-muted); max-width: 320px; margin: 0 auto; }
  .points-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #FFF5DC; color: var(--ink);
    padding: 10px 20px; border-radius: 999px;
    font-weight: 700; font-size: 15px;
    margin: 0 auto;
  }
  .points-badge .star { color: var(--amber); font-size: 16px; }
  .result-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-top: 6px;
  }
  .result-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 8px;
  }
  .result-stat .val { font-size: 20px; font-weight: 800; }
  .result-stat .lbl { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

  .fade-in { animation: fade .25s ease-out; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="shell">
  <div id="topbar" class="topbar"></div>
  <div id="progressWrap" class="progress-wrap" style="display:none"></div>
  <div id="ageBar" class="age-bar" style="display:none"></div>
  <div id="body" class="body"></div>
  <div id="footer" class="footer"></div>
</div>

<script>
/* ========================================================
   Icons
   ======================================================== */
const ICO = {
  back: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
  chev: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  tick: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
  x:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  eye:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  camera:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  mascot: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="100" cy="170" rx="70" ry="10" fill="rgba(74, 46, 30, 0.08)"/>
    <path d="M100 25 L125 80 L182 88 L140 128 L152 185 L100 158 L48 185 L60 128 L18 88 L75 80 Z" fill="#E0A24A" stroke="#B87E29" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="82" cy="100" r="7" fill="#4A2E1E"/>
    <circle cx="118" cy="100" r="7" fill="#4A2E1E"/>
    <circle cx="85" cy="97" r="2.2" fill="#fff"/>
    <circle cx="121" cy="97" r="2.2" fill="#fff"/>
    <path d="M78 122 Q100 140 122 122" stroke="#4A2E1E" stroke-width="4" stroke-linecap="round" fill="none"/>
    <ellipse cx="68" cy="116" rx="6" ry="4" fill="#E08963" opacity="0.6"/>
    <ellipse cx="132" cy="116" rx="6" ry="4" fill="#E08963" opacity="0.6"/>
  </svg>`,
  heroFace: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="65" fill="#E0A24A"/>
    <circle cx="82" cy="95" r="7" fill="#4A2E1E"/>
    <circle cx="118" cy="95" r="7" fill="#4A2E1E"/>
    <circle cx="85" cy="92" r="2" fill="#fff"/>
    <circle cx="121" cy="92" r="2" fill="#fff"/>
    <path d="M78 120 Q100 138 122 120" stroke="#4A2E1E" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="68" cy="112" r="5" fill="#E08963" opacity="0.5"/>
    <circle cx="132" cy="112" r="5" fill="#E08963" opacity="0.5"/>
    <path d="M40 40 Q50 55 40 70" stroke="#B87E29" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M160 40 Q150 55 160 70" stroke="#B87E29" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>`
};

/* ========================================================
   Question banks — same UI, content varies by age
   ======================================================== */
const AGES = [
  { key: '3-5', label: 'Age 3–5', title: 'Little Learners' },
  { key: '5-8', label: 'Age 5–8', title: 'Young Explorers' },
  { key: '8-12', label: 'Age 8–12', title: 'Curious Minds' }
];

const BANKS = {
  '3-5': [
    { q: 'Where is the dog? 🐶', options: ['In the house', 'On the moon', 'Under water', 'In the sky'], correctIdx: 0, explain: 'Dogs live with us at home, as pets.' },
    { q: 'What color is the sun? ☀️', options: ['Yellow', 'Green', 'Purple', 'Blue'], correctIdx: 0, explain: 'The sun looks yellow when we see it.' },
    { q: 'Which one is a fruit? 🍎', options: ['Apple', 'Chair', 'Pencil', 'Shoe'], correctIdx: 0, explain: 'An apple is a yummy fruit.' },
    { q: 'How many wheels does a bike have? 🚲', options: ['Two', 'Five', 'Ten', 'One'], correctIdx: 0, explain: 'A bicycle has two wheels.' },
    { q: 'Which animal says "moo"? 🐄', options: ['Cow', 'Cat', 'Duck', 'Pig'], correctIdx: 0, explain: 'Cows say moo!' }
  ],
  '5-8': [
    { q: 'What animal did we just learn about?', options: ['Elephant', 'Penguin', 'Kangaroo', 'Ostrich'], correctIdx: 2, explain: 'Kangaroos are marsupials that live in Australia.' },
    { q: 'Which of these is a mammal?', options: ['Fish', 'Bird', 'Dolphin', 'Frog'], correctIdx: 2, explain: 'Dolphins breathe air and feed milk to their young — they are mammals.' },
    { q: 'How many days are in a week?', options: ['5', '6', '7', '8'], correctIdx: 2, explain: 'There are seven days: Monday through Sunday.' },
    { q: 'Which is the tallest animal?', options: ['Lion', 'Giraffe', 'Zebra', 'Hippo'], correctIdx: 1, explain: 'Giraffes can grow up to 6 meters tall!' },
    { q: 'What do plants need to grow?', options: ['Soda', 'Sunlight & water', 'Darkness', 'Cold only'], correctIdx: 1, explain: 'Plants use sunlight, water, and air to make their food.' }
  ],
  '8-12': [
    { q: 'Why do some animals live in groups?', options: ['For entertainment only', 'For protection and hunting together', 'Because the weather is cold', 'They have no choice'], correctIdx: 1, explain: 'Living in groups helps animals protect each other, hunt more effectively, and raise young safely.' },
    { q: 'Which process do plants use to make food?', options: ['Respiration', 'Photosynthesis', 'Digestion', 'Evaporation'], correctIdx: 1, explain: 'Photosynthesis uses sunlight, CO₂, and water to produce glucose and oxygen.' },
    { q: 'If David was 27 years old in 2011, how old was he in 2003?', options: ['19 years', '37 years', '20 years', '17 years'], correctIdx: 0, explain: '2011 − 2003 = 8 years, so 27 − 8 = 19 years.' },
    { q: 'What causes the seasons on Earth?', options: ["Earth's distance from the Sun", "Earth's axial tilt", 'Moon phases', 'Ocean currents'], correctIdx: 1, explain: "Earth's 23.5° axial tilt causes different parts of Earth to receive more or less direct sunlight through the year." },
    { q: 'Which is the smallest prime number?', options: ['0', '1', '2', '3'], correctIdx: 2, explain: '2 is the smallest prime — and the only even one.' }
  ]
};

/* ========================================================
   State
   ======================================================== */
const SKEY = 'littlelearners-v1';
const state = load() || defaultState();
function defaultState() {
  return {
    screen: 'intro',          // intro | question | result
    ageKey: '5-8',
    idx: 0,
    answers: [],              // { picked, correct }
    points: 0,
    startedAt: null,
    pickedThisQ: null         // index of chosen option for current question (locked after pick)
  };
}
function load() { try { return JSON.parse(localStorage.getItem(SKEY)); } catch(e) { return null; } }
function save() { try { localStorage.setItem(SKEY, JSON.stringify(state)); } catch(e) {} }
function resetAll() { Object.assign(state, defaultState()); save(); render(); }

function questions() { return BANKS[state.ageKey]; }
function currentQ() { return questions()[state.idx]; }

/* ========================================================
   Rendering
   ======================================================== */
function render() {
  const ageBar = document.getElementById('ageBar');
  const progressWrap = document.getElementById('progressWrap');
  if (state.screen === 'intro') {
    progressWrap.style.display = 'none';
    ageBar.style.display = 'none';
    renderTopbar({ kind: 'intro' });
    renderIntro();
    return;
  }
  if (state.screen === 'question') {
    progressWrap.style.display = 'block';
    ageBar.style.display = 'flex';
    renderTopbar({ kind: 'question' });
    renderAgeBar();
    renderProgress();
    renderQuestion();
    renderQFooter();
    return;
  }
  if (state.screen === 'result') {
    progressWrap.style.display = 'none';
    ageBar.style.display = 'none';
    renderTopbar({ kind: 'result' });
    renderResult();
    return;
  }
}

/* ===== Topbar ===== */
function renderTopbar({ kind }) {
  const ageTitle = AGES.find(a => a.key === state.ageKey).title;
  if (kind === 'intro' || kind === 'result') {
    document.getElementById('topbar').innerHTML = `
      <div></div>
      <div class="topbar-title">${ageTitle}</div>
      <div></div>
    `;
    return;
  }
  document.getElementById('topbar').innerHTML = `
    <button class="back-btn" onclick="goBack()" aria-label="Back">${ICO.back}</button>
    <div class="topbar-title">${ageTitle}</div>
    <button class="skip-btn" onclick="skipQ()">Skip</button>
  `;
}

/* ===== Age bar ===== */
function renderAgeBar() {
  document.getElementById('ageBar').innerHTML = AGES.map(a => `
    <button class="age-chip ${a.key === state.ageKey ? 'active' : ''}" onclick="switchAge('${a.key}')">${a.label}</button>
  `).join('');
}
function switchAge(key) {
  if (key === state.ageKey) return;
  state.ageKey = key; state.idx = 0; state.answers = [];
  state.points = 0; state.pickedThisQ = null;
  save(); render();
}

/* ===== Progress ===== */
function renderProgress() {
  const total = questions().length;
  const answered = state.answers.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressWrap').innerHTML = `
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-text"><span class="done">${answered}</span><span class="total">/${total}</span></div>
  `;
}

/* ===== Intro ===== */
function renderIntro() {
  const age = AGES.find(a => a.key === state.ageKey);
  document.getElementById('body').innerHTML = `
    <div class="intro fade-in">
      <div class="intro-hero">${ICO.heroFace}</div>
      <div>
        <h1>${age.title}</h1>
        <p>Tap Start to begin. The interface stays the same — only the question difficulty changes by age.</p>
      </div>
      <div class="age-bar" style="display:flex;justify-content:center">
        ${AGES.map(a => `<button class="age-chip ${a.key === state.ageKey ? 'active' : ''}" onclick="switchAge('${a.key}')">${a.label}</button>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('footer').innerHTML = `
    <button class="cta" style="width:100%" onclick="startQuiz()">Start Quiz →</button>
  `;
  document.getElementById('footer').style.justifyContent = 'center';
}

function startQuiz() {
  state.screen = 'question';
  state.idx = 0; state.answers = []; state.points = 0; state.pickedThisQ = null;
  state.startedAt = Date.now();
  save(); render();
}

/* ===== Question ===== */
function renderQuestion() {
  const q = currentQ();
  const locked = state.pickedThisQ !== null;

  document.getElementById('body').innerHTML = `
    <div class="fade-in">
      <div class="q-title">${q.q}</div>
    </div>
    <div class="options">
      ${q.options.map((opt, i) => {
        const isRight = i === q.correctIdx;
        let cls = '';
        if (locked) {
          if (i === state.pickedThisQ && isRight) cls = 'correct locked';
          else if (i === state.pickedThisQ && !isRight) cls = 'wrong locked';
          else if (isRight) cls = 'correct locked';
          else cls = 'dim locked';
        }
        const showExplain = locked && isRight;
        const rightCircle = isRight && locked
          ? `<div class="tick-circle">${ICO.tick}</div>`
          : (!isRight && i === state.pickedThisQ && locked
              ? `<div class="x-circle">${ICO.x}</div>`
              : `<span class="chev">${ICO.chev}</span>`);
        return `
          <button class="opt ${cls}" onclick="${locked ? '' : `pickOption(${i})`}">
            <div class="opt-inner">
              <span class="opt-text">${opt}</span>
              ${showExplain ? `<span class="explain-link">${ICO.eye} See explanation</span>` : ''}
            </div>
            ${rightCircle}
          </button>
        `;
      }).join('')}
    </div>
    ${locked ? `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:14px;color:var(--ink-muted);line-height:1.5">
        <strong style="color:var(--ink)">Why?</strong> ${q.explain}
      </div>
    ` : ''}
  `;
}

function pickOption(i) {
  const q = currentQ();
  state.pickedThisQ = i;
  const correct = i === q.correctIdx;
  if (correct) state.points += 10;
  state.answers.push({ picked: i, correct });
  save(); render();
}

function renderQFooter() {
  const locked = state.pickedThisQ !== null;
  const isLast = state.idx === questions().length - 1;
  document.getElementById('footer').style.justifyContent = 'space-between';
  if (locked) {
    document.getElementById('footer').innerHTML = `
      <button class="report"><span class="ico">!</span>Report question</button>
      <button class="cta coral" style="width:auto;padding:12px 22px;font-size:14px" onclick="nextQ()">
        ${isLast ? 'See Results' : 'Next Question'} →
      </button>
    `;
  } else {
    document.getElementById('footer').innerHTML = `
      <button class="report"><span class="ico">!</span>Report question</button>
      <button class="footer-icon-btn" title="Capture">${ICO.camera}</button>
    `;
  }
}

function skipQ() {
  state.answers.push({ picked: null, correct: false, skipped: true });
  state.pickedThisQ = null;
  advance();
}
function nextQ() {
  state.pickedThisQ = null;
  advance();
}
function goBack() {
  if (state.idx > 0) {
    state.idx--;
    // remove last answer to re-ask
    state.answers.pop();
    state.pickedThisQ = null;
    save(); render();
  } else {
    state.screen = 'intro'; save(); render();
  }
}
function advance() {
  if (state.idx < questions().length - 1) {
    state.idx++;
    state.pickedThisQ = null;
    save(); render();
  } else {
    state.screen = 'result'; save(); render();
  }
}

/* ===== Result ===== */
function renderResult() {
  const total = questions().length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;
  const duration = state.startedAt ? Math.floor((Date.now() - state.startedAt) / 1000) : 0;
  const mm = String(Math.floor(duration / 60)).padStart(2, '0');
  const ss = String(duration % 60).padStart(2, '0');
  const title = pct === 100 ? 'Perfect Scorer!' : passed ? 'Great Job! You Did It!' : 'Good effort!';
  const sub = pct === 100
    ? 'Your flawless quiz performance sets a new standard of excellence.'
    : `You got ${correct} out of ${total} correct!`;

  document.getElementById('body').innerHTML = `
    <div class="result fade-in">
      <div class="star-box">${ICO.mascot}</div>
      <div>
        <h1>${title}</h1>
        <div class="sub" style="margin-top:8px">${sub}</div>
      </div>
      <div class="points-badge"><span class="star">★</span> ${state.points} points earned</div>
      <div class="result-stats">
        <div class="result-stat"><div class="val">${correct}/${total}</div><div class="lbl">Correct</div></div>
        <div class="result-stat"><div class="val">${pct}%</div><div class="lbl">Accuracy</div></div>
        <div class="result-stat"><div class="val">${mm}:${ss}</div><div class="lbl">Time</div></div>
      </div>
    </div>
  `;
  document.getElementById('footer').style.justifyContent = 'center';
  document.getElementById('footer').style.flexDirection = 'column';
  document.getElementById('footer').style.gap = '10px';
  document.getElementById('footer').innerHTML = `
    <button class="cta coral" style="width:100%" onclick="resetAll()">Try Again</button>
    <button class="cta ink" style="width:100%" onclick="nextAge()">Next Quiz</button>
  `;
}
function nextAge() {
  const i = AGES.findIndex(a => a.key === state.ageKey);
  const next = AGES[(i + 1) % AGES.length];
  state.ageKey = next.key;
  resetAll();
}

/* Init */
render();
</script>
</body>
</html>
